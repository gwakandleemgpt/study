<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과 역량 관점으로 보는 학생부 기록 사례</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1c2b4a;--gold:#b8892a;--gold2:#d4aa55;
  --cream:#f7f5f0;--cream2:#ede9e1;--white:#fff;--text:#222;--muted:#555;--border:#ddd8ce;
  --r1:#b07c0a;--r2:#5e5e5e;--r3:#9e5f30;
  --c1:#2e5fa3;--c2:#1e7a47;--c3:#8b2252;--c4:#c45208;--c5:#1a6fa3;
  --c6:#6a3e15;--c7:#7a2a8a;--c9a:#8a2222;--c9b:#5a1a6a;--c9c:#1a5a2a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px;}

/* HEADER */
.hdr{background:var(--navy);padding:0 26px;display:flex;align-items:center;height:68px;gap:16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr-title{font-family:'Noto Sans KR',sans-serif;color:#fff;font-size:1.9rem;font-weight:700;letter-spacing:-.5px;white-space:nowrap;}
.hdr-author{color:var(--gold2);font-size:1rem;margin-left:auto;white-space:nowrap;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:210px 1fr 250px;height:calc(100vh - 68px);overflow:hidden;}

/* SIDENAV */
.sidenav{background:var(--navy);overflow-y:auto;padding:14px 0 40px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;}
.nsec{font-size:.9rem;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.3);text-transform:uppercase;padding:14px 16px 4px;}
.nbtn{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,.6);font-size:1.13rem;font-weight:500;transition:all .13s;position:relative;border:none;background:none;width:100%;text-align:left;}
.nbtn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
.nbtn.active{color:#fff;background:rgba(255,255,255,.11);}
.nbtn.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;background:var(--cc,var(--gold2));}
.ndot{width:9px;height:9px;border-radius:50%;flex-shrink:0;opacity:.5;}
.nbtn.active .ndot{opacity:1;}
.nsub{padding-left:28px;font-size:1.05rem;}

/* MAIN */
.main{overflow-y:auto;padding:22px 20px 50px;scrollbar-width:thin;}
.cat-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:13px;border-bottom:2px solid var(--border);}
.cat-badge{padding:5px 16px;border-radius:20px;color:#fff;font-size:1.05rem;font-weight:700;letter-spacing:.5px;}
.cat-name{font-family:'Noto Serif KR',serif;font-size:1.6rem;font-weight:700;color:var(--navy);}
.etabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.etab{padding:7px 15px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .13s;font-family:'Noto Sans KR',sans-serif;}
.etab:hover{border-color:var(--cc,var(--navy));color:var(--cc,var(--navy));}
.etab.active{background:var(--cc,var(--navy));border-color:var(--cc,var(--navy));color:#fff;}

/* RECORD CARD */
.rec{background:var(--white);border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.08);overflow:hidden;}
.rec-meta{padding:12px 20px 10px;border-bottom:1px solid var(--cream2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.m-sub{font-size:.88rem;font-weight:700;letter-spacing:.4px;padding:3px 10px;border-radius:8px;color:#fff;}
.m-type{font-size:.82rem;color:var(--muted);background:var(--cream);border-radius:7px;padding:3px 9px;}
.rec-body{padding:20px 22px 16px;font-family:'Noto Serif KR',serif;font-size:.93rem;line-height:2.0;color:#2a2a2a;letter-spacing:-.2px;}

/* HIGHLIGHT SPANS */
.h1{background:rgba(176,124,10,.15);color:var(--r1);font-weight:600;border-radius:3px;padding:0 2px;border-bottom:2px solid rgba(176,124,10,.4);transition:background .25s;}
.h2{background:rgba(94,94,94,.11);color:var(--r2);font-weight:600;border-radius:3px;padding:0 2px;border-bottom:2px solid rgba(94,94,94,.3);transition:background .25s;}
.h3{background:rgba(158,95,48,.12);color:var(--r3);font-weight:600;border-radius:3px;padding:0 2px;border-bottom:2px solid rgba(158,95,48,.3);transition:background .25s;}
.h1.glow{background:rgba(176,124,10,.38);}
.h2.glow{background:rgba(94,94,94,.3);}
.h3.glow{background:rgba(158,95,48,.32);}

/* ANALYSIS SECTION — below record */
.rec-analysis{border-top:1px solid var(--cream2);padding:16px 20px 18px;background:#faf9f5;}
.ra-hdr{font-size:1rem;font-weight:700;letter-spacing:.6px;color:var(--navy);margin-bottom:12px;}
.ra-rows{display:flex;flex-direction:column;gap:9px;}
.ra-row{display:flex;align-items:flex-start;gap:11px;cursor:pointer;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);transition:box-shadow .15s,transform .12s;}
.ra-row:hover{box-shadow:0 3px 10px rgba(0,0,0,.11);transform:translateX(3px);}
.ra-bdg{flex-shrink:0;width:56px;padding:3px 0;text-align:center;border-radius:14px;font-size:.8rem;font-weight:800;color:#fff;}
.rb1{background:var(--r1);}.rb2{background:var(--r2);}.rb3{background:var(--r3);}
.ra-info{flex:1;}
.ra-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.ra-name{font-size:.95rem;font-weight:700;}
.rn1{color:var(--r1);}.rn2{color:var(--r2);}.rn3{color:var(--r3);}
.ra-pct{font-size:.78rem;color:var(--muted);margin-left:auto;}
.ra-bar{width:100%;height:5px;background:#e5e0d8;border-radius:3px;margin:5px 0;}
.ra-fill{height:100%;border-radius:3px;}
.rf1{background:var(--r1);}.rf2{background:var(--r2);}.rf3{background:var(--r3);}
.ra-desc{font-size:.82rem;color:var(--muted);line-height:1.6;}
.ra-hint{font-size:.72rem;color:#bbb;margin-top:9px;text-align:right;}

/* COMPETENCY INTRO TAB */
.comp-intro{background:var(--white);border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.08);padding:24px 26px;}
.ci-title{font-family:'Noto Serif KR',serif;font-size:1.3rem;font-weight:700;color:var(--navy);margin-bottom:6px;}
.ci-sub{font-size:.92rem;color:var(--muted);margin-bottom:18px;line-height:1.7;}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chip{padding:11px 14px;border-radius:8px;border-left:4px solid;background:var(--cream);}
.chip-num{font-size:.73rem;font-weight:700;letter-spacing:.8px;margin-bottom:4px;opacity:.7;}
.chip-name{font-size:.97rem;font-weight:700;line-height:1.3;margin-bottom:4px;}
.chip-desc{font-size:.8rem;color:var(--muted);line-height:1.55;}
.src-note{margin-top:14px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);padding-top:10px;line-height:1.7;}

/* RIGHT PANEL */
.rp{background:var(--cream2);border-left:1px solid var(--border);overflow-y:auto;padding:20px 15px 32px;scrollbar-width:thin;}
.rp-h{font-size:.92rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--navy);margin-bottom:13px;padding-bottom:8px;border-bottom:2px solid var(--navy);}
.lbox{background:var(--white);border-radius:7px;padding:13px 15px;}
.lrow{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:.92rem;color:#333;}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rp-note{font-size:.82rem;color:var(--muted);margin-top:16px;line-height:1.8;text-align:center;padding:13px;background:var(--white);border-radius:7px;}

.fade-in{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1050px){.layout{grid-template-columns:195px 1fr}.rp{display:none}}
@media(max-width:720px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidenav{height:auto;display:flex;flex-wrap:wrap;padding:8px;gap:5px}
  .nbtn{width:auto;border-radius:20px;padding:5px 11px;font-size:.9rem}
  .nsec{display:none}.nbtn.active::before{display:none}
  .comp-grid{grid-template-columns:1fr}
  .hdr-title{font-size:1.2rem}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">교과 역량 관점으로 보는 학생부 기록 사례</div>
  <div class="hdr-author">✍ 화원고등학교 진로진학상담교사 박한민</div>
</header>
<div class="layout">
<nav class="sidenav">
  <div class="nsec">교과 세특</div>
  <button class="nbtn active" data-cat="korean" style="--cc:var(--c1)" onclick="sw('korean',this)"><span class="ndot" style="background:var(--c1)"></span>국어과</button>
  <button class="nbtn" data-cat="math" style="--cc:var(--c2)" onclick="sw('math',this)"><span class="ndot" style="background:var(--c2)"></span>수학과</button>
  <button class="nbtn" data-cat="english" style="--cc:var(--c3)" onclick="sw('english',this)"><span class="ndot" style="background:var(--c3)"></span>영어과</button>
  <button class="nbtn" data-cat="social" style="--cc:var(--c4)" onclick="sw('social',this)"><span class="ndot" style="background:var(--c4)"></span>사회과</button>
  <button class="nbtn" data-cat="science" style="--cc:var(--c5)" onclick="sw('science',this)"><span class="ndot" style="background:var(--c5)"></span>과학과</button>
  <button class="nbtn" data-cat="history" style="--cc:var(--c6)" onclick="sw('history',this)"><span class="ndot" style="background:var(--c6)"></span>한국사</button>
  <button class="nbtn" data-cat="arts" style="--cc:var(--c7)" onclick="sw('arts',this)"><span class="ndot" style="background:var(--c7)"></span>예체능·교양</button>
  <div class="nsec" style="margin-top:6px">창의적 체험활동</div>
  <button class="nbtn nsub" data-cat="auto" style="--cc:var(--c9a)" onclick="sw('auto',this)"><span class="ndot" style="background:var(--c9a)"></span>자율활동</button>
  <button class="nbtn nsub" data-cat="career" style="--cc:var(--c9b)" onclick="sw('career',this)"><span class="ndot" style="background:var(--c9b)"></span>진로활동</button>
  <button class="nbtn nsub" data-cat="club" style="--cc:var(--c9c)" onclick="sw('club',this)"><span class="ndot" style="background:var(--c9c)"></span>동아리활동</button>
</nav>
<main class="main" id="mc"></main>
<aside class="rp">
  <div class="rp-h">총론 6대 핵심역량</div>
  <div class="lbox">
    <div class="lrow"><span class="ldot" style="background:#e67e22"></span>자기관리 역량</div>
    <div class="lrow"><span class="ldot" style="background:#2980b9"></span>지식정보처리 역량</div>
    <div class="lrow"><span class="ldot" style="background:#8e44ad"></span>창의적 사고 역량</div>
    <div class="lrow"><span class="ldot" style="background:#c0392b"></span>심미적 감성 역량</div>
    <div class="lrow"><span class="ldot" style="background:#16a085"></span>협력적 소통 역량</div>
    <div class="lrow"><span class="ldot" style="background:#27ae60"></span>공동체 역량</div>
  </div>
  <div class="rp-note">아래 역량 카드를 클릭하면 해당 서술 구간으로 이동합니다 👆<br><br><b style="color:var(--r1)">1위</b> · <b style="color:var(--r2)">2위</b> · <b style="color:var(--r3)">3위</b> 색상으로 역량을 확인하세요</div>
</aside>
</div>

          {r:3,name:'정체성과 상호 존중',desc:'토종 동물 복원 정책을 탐구하며 과거 잘못을 바로잡는 방안을 고민하는 역사의식',pct:20}
        ]
      }
    ]
  },

  arts:{label:'예체능·교양',color:'var(--c7)',noComp:true,items:[
    {tab:'사례 1',subject:'물리학1 (파동·음악)',type:'세부능력 및 특기사항',
     text:`파동과 정보통신 단원에 관심이 많은 학생으로 정상파와 음악과 연결하여 학습하는 등 교과 간의 융합 능력이 탁월한 학생임. <span class="h1">음악 수행평가 후 조화로운 화음과 불협화음을 구분 짓는 요인에 대한 의문점을 해결하기 위해 '음악 본능(크리스토프 드뢰서)'의 느낌 챕터와 헬름홀츠의 이론을 참고하는 등 추가로 학습함. 수학1 시간에 배운 기본 개념을 적용해 진동수를 이용한 화음의 일반항을 수식으로 표현해보는 등 물리와 수학과 음악을 융합하여 이해함</span>. 단진자를 이용하여 중력가속도 측정 탐구 실험에서 주어진 과제에 추가로 <span class="h2">중심각을 변인으로 설정하여 실험을 스스로 계획 주도함. 상대오차 계산 후 중심각과 각운동이라는 두 가지 요인을 오차의 원인으로서 추론함. 적용한 주기 관련 수식이 중심각이 작은 경우에만 성립하는 점을 깨닫고 중심각이 큰 측정 방법에 대한 의문을 품고 선생님께 질문함</span>. <span class="h3">무한급수의 형태로 표현된다는 설명을 들은 후, 인터넷 동영상, 극좌표계 등을 스스로 학습 후 유도과정을 이해하려고 노력하는 모습에서 자기주도적 학습능력이 돋보임. 물리와 수학과 음악의 교과 간 융합을 통한 심미적 이해와 창의적 탐구가 탁월함</span>.`,
     comps:[{r:1,name:'창의적 사고 역량',desc:'화음의 수학적 구조를 물리학으로 탐구하는 융합적 창의적 사고',pct:45},{r:2,name:'자기관리 역량',desc:'중심각 추가 실험을 자기주도적으로 설계하고 탐구하는 역량',pct:30},{r:3,name:'심미적 감성 역량',desc:'음악과 물리학을 연결하여 감성적으로 이해하고 탐구하는 심미적 태도',pct:25}]},
    {tab:'사례 2',subject:'체육 (생체역학)',type:'세부능력 및 특기사항',
     text:`평소 생체역학에 관심을 가지고 있으며 발의 구조 속 아치 구조가 중요한 기능을 수행하고 있음을 알게 되어 '발 속 아치 구조의 기능에 대한 분석'을 주제로 탐구 활동을 시작함. <span class="h1">사람의 발이 아치 구조를 띠고 있기 때문에 다른 동물들과 달리 직립 보행이 가능하며, 인간만이 발에 2개의 디딤 포인트를 지니고 있다는 사실을 파악함. 이를 통해 체중 분산과 충격 흡수의 원리를 물리적 관점에서 분석하는 활동을 진행함</span>. <span class="h2">점심시간에 운동을 하면 오후 수업에 집중이 더 잘 된다는 점에 착안하여 '체육 수업이 학업에 미치는 영향'이라는 자율 주제를 탐구하여 발표함. '운동화를 신은 뇌(존 레이터)'를 읽고 운동 후 기분이 좋아지는 이유를 신체적, 생리적으로 분석하여 추론하고 미국 고등학교에서 0교시 체육 수업 후 학업 능력이 향상된 사례를 구체적 수치로 설명함으로써 신뢰성을 높임</span>. <span class="h3">향후 스포츠 과학의 한 분야인 생체역학, 운동역학을 탐구해 보고 싶다는 계획을 발표하여 큰 박수를 받음. 체육과 뇌과학을 연결하는 탐구 태도가 탁월하며 운동의 신경가소성 효과에 대한 관심을 학업과 진로에 접목하는 통합적 사고가 돋보임</span>.`,
     comps:[{r:1,name:'지식정보처리 역량',desc:'독서·실증 수치로 체육과 학업의 관계를 논리적으로 분석·발표',pct:40},{r:2,name:'창의적 사고 역량',desc:'발의 아치 구조를 생체역학으로 연결하는 독창적 탐구 사고',pct:35},{r:3,name:'심미적 감성 역량',desc:'운동과 뇌과학을 통합하여 체육의 새로운 의미를 발견하는 감수성',pct:25}]},
    {tab:'사례 3',subject:'심리학(교양)',type:'세부능력 및 특기사항',
     text:`'과학적인 방법으로 인간의 마음 읽기'라는 담론을 중심으로 인간의 심리에 대한 심화된 탐구의 기회를 가짐. <span class="h1">심리학의 신격화를 경계하며 프레이밍 효과가 행동에 개인의 성격과 같은 사람 변인을 고려하지 않았다는 한계를 도출하는 모습이 인상적이었음. 관심 연구 주제를 설정하여 '메시지 프레이밍과 콘텐츠 유형에 따른 청소년 자살 예방 캠페인 효과에 관한 연구'라는 선행 연구를 찾아보고 내용을 요약하여 발표함</span>. <span class="h2">손실·이익 메시지 프레이밍이 COVID-19 백신 접종 의향에 영향을 미치는지 알아보기 위해 가설을 세우고 고등학생 116명을 대상으로 인터넷 설문조사를 하여 독립 표본 t-test를 실시한 결과 메시지 프레이밍에 따른 집단 간 평균차이가 통계적으로 유의한 수준으로 나타나 가설을 채택함</span>. <span class="h3">어려운 개념에 대한 이해가 빠르며 새로운 학습과 배움에 두려움이 없음. 심리학적 연구 방법론을 고등학교 수준에서 직접 설계·실행하는 탁월한 역량이 돋보이며 항상 수업에 적극적으로 참여하는 바른 인성을 지닌 학생임</span>.`,
     comps:[{r:1,name:'창의적 사고 역량',desc:'심리학 한계를 스스로 도출하고 독립적 연구를 설계하는 독창적 접근',pct:45},{r:2,name:'지식정보처리 역량',desc:'설문 설계·t-test 분석·결론 도출의 사회과학적 정보처리 역량',pct:35},{r:3,name:'자기관리 역량',desc:'새로운 통계 개념을 두려움 없이 습득·적용하는 자기주도 학습 태도',pct:20}]},
    {tab:'사례 4',subject:'교육학(교양)',type:'세부능력 및 특기사항',
     text:`한 줄로 정의하는 교육이란 질문에서 '사회인으로 만드는 과정'이라 정의하고 루소의 '에밀'을 분석해 교육철학을 정립하는 활동에서 에밀을 관통하는 '경험을 토대로 스스로 이성을 형성하는 것이 교육이다'란 의견에 공감하지만 <span class="h1">자율성만을 토대로 한 사회적 성장엔 한계가 있으며 현대사회의 빠른 변화 속에선 효용성이 떨어지는 방법이 될 수 있다는 우려를 표함. 칸트 교육 철학에 대해 탐색한 뒤 루소와 칸트의 주장을 비교하고 교육이 지닌 수단성에 동의하는 의견을 제시하는 등 교육의 본질에 대해 고심하는 모습이 인상적임</span>. 교육사상가 탐구활동에서 비고츠키를 선정해 근접발달영역, 비계, 언어 등의 핵심개념으로 게시물을 작성해 발표함. <span class="h2">시각화를 통해 청중의 이해를 돕는 설명 방식이 인상적이었으며 내용 전달에 급급하지 않고 비고츠키의 주장들은 학습 지원 과정에 대한 통찰이 돋보이며 교육심리 영역의 확장을 가능케했다는 평을 하는 등 사상 전반에 대한 깊은 이해를 보임</span>. <span class="h3">수업지도안 작성 및 수업 실연활동에서 수학 교과를 선정해 수학에 큰 관심이 없는 친구에게 마치 1타 인강 강사같은 수업으로 집중과 이해가 잘 되었다는 생생한 동료 평가를 받는 등 뛰어난 교수역량을 보임. 루소·칸트·비고츠키를 비교 분석하여 교육의 본질에 대한 자신만의 관점을 형성하는 심화 탐구 태도가 돋보임</span>.`,
     comps:[{r:1,name:'창의적 사고 역량',desc:'루소·칸트·비고츠키를 비교 분석하여 교육 본질에 대한 독창적 관점을 형성',pct:45},{r:2,name:'지식정보처리 역량',desc:'교육 사상가의 핵심 개념을 시각화하여 체계적으로 정리하고 발표',pct:30},{r:3,name:'협력적 소통 역량',desc:'동료가 이해하기 쉬운 수업을 실연하며 뛰어난 교수 소통 역량을 발휘',pct:25}]},
    {tab:'사례 5',subject:'정보(인공지능기초)',type:'세부능력 및 특기사항',
     text:`논리적인 사고력이 우수하며 문제 해결을 위한 알고리즘을 잘 설계하고 문제 해결력이 뛰어남. SW 개발 프로젝트에서 파이썬으로 <span class="h1">'FFT를 활용한 음원 주파수 분석 프로그램'을 개발함. 수학적 사고와 적분 교과에서 푸리에 변환을 탐구한 경험을 토대로 음원의 주파수를 추출 및 편집하는 프로그램을 개발함. 음원 파일 데이터 추출, FFT 수행, 그래프를 통한 시각화를 위해 라이브러리를 능동적으로 학습하고 시간 단위 분석, 주파수 단위 분석, 주파수 편집 기능을 모듈화 함으로써 간결하고 가독성 높은 프로그램을 완성함</span>. <span class="h2">중첩 제어구조 처리가 논리적으로 잘 구현되었으며 시각화한 그래프 출력 등 편리한 사용자 인터페이스를 지향한 점이 돋보임</span>. <span class="h3">'쿨리-튜키 알고리즘 기반 FFT의 원리 분석 및 실제적 구현'에 관한 심화 탐구를 진행함. FFT의 유도 과정을 수학적으로 증명하고, 홀짝을 나눠 분할 정복 알고리즘을 사용하기 때문에 FFT가 DFT보다 더 짧은 시간 동안 동작할 수 있음을 밝힘. 이를 검증하기 위해 FFT를 직접 코딩하여 구현하고 DFT와의 실행시간을 비교하며 수학적 지식과 컴퓨팅 사고력을 융합하여 탐구를 확장시켜 나가는 자세가 우수함</span>.`,
     comps:[{r:1,name:'창의적 사고 역량',desc:'수학적 푸리에 변환을 음원 분석 프로그램으로 창의적으로 구현',pct:40},{r:2,name:'지식정보처리 역량',desc:'모듈화·시각화를 통해 사용자 친화적 프로그램을 체계적으로 설계',pct:35},{r:3,name:'자기관리 역량',desc:'FFT 원리를 수학적으로 증명하고 직접 코딩으로 검증하는 자기주도 심화 학습',pct:25}]}
  ]},
  auto:{
    label:'자율활동',color:'var(--c9a)',
    items:[
      {no:0,tab:'교과역량',subject:'',type:'',isComp:true},
      {
        no:1,tab:'사례 1',subject:'자율활동 (독거노인 봉사 연계)',type:'창의적 체험활동상황',
        text:`학급 내 분리수거 도우미로 매일 아침 휴지통 주변을 청소하며 궂은 일도 앞장서서 희생하는 모습을 보임으로써 분리수거 문화를 정착하여 학급에 선한 영향력을 미침. <span class="h3" data-rank="3">독거노인 도시락 배달 봉사를 하던 중 노인분께서 백내장과 동맥 경화증 등 노화성 질환을 앓고 계심을 알게 됨</span>. 이후 노화로 발병하는 질병들의 원리에 대해 조사함. <span class="h1" data-rank="1">세포 노화가 기관의 노화로 이어지면서 퇴행성 질환까지 발병할 수 있음을 알고, 거동이 불편하셔서 주기적인 병원 방문이 어려우신 노인 분들의 상황을 고려하여 노화 질환들을 효과적으로 치료할 수 있는 새로운 치료법에 대해 탐구함. 조사 과정에서 체내 샤페론이 변성된 폴리펩타이드의 3차원 접힘 형태를 촉매하여 정확한 형태로 접히는 단백질 항상성 유지와 노화 과정에서의 단백질 응집 예방을 통한 세포 수명 연장을 수행한다는 것을 알아냄. 샤페론과 노화된 단백질을 분해하여 세포의 항상성을 유지하는 자가포식 시스템 간의 커뮤니케이션을 활성화하는 약물 치료법이 세포 노화로 인한 질병의 치료에 도움을 줄 것이라 주장함</span>. <span class="h2" data-rank="2">학술자료를 탐독하고 샤페론 매개 자가포식이 알파시누클레인 분해를 촉진한다는 실험 데이터를 근거로 자신의 치료법의 효용성을 검증함</span>.`,
        comps:[
          {r:1,name:'지식정보처리 역량',desc:'노화 메커니즘 학술자료를 탐독하여 약물 치료법의 효용성을 논리적으로 검증',pct:45},
          {r:2,name:'창의적 사고 역량',desc:'봉사 경험에서 의학적 탐구 주제를 도출하고 치료법 아이디어를 독창적으로 제안',pct:30},
          {r:3,name:'공동체 역량',desc:'봉사 활동에서 노인 건강 문제를 인식하고 탐구로 연결하는 공동체 참여 의식',pct:25}
        ]
      },

        text:`평소 의료통계를 찾아보며 의학과 사회의 관계 속에서 개선되어야 하는 점을 적극적으로 찾으며 WHO의 세계질병부담연구에서 사망 위험요인의 기여도 중 1위가 고혈압임을 확인하고 이에 대한 문제의식을 가지고 추가적으로 조사를 진행함. <span class="h1" data-rank="1">이 과정에서 고혈압에서 진행되는 질병들 중 모 전자간증을 접하며 임산부뿐만 아니라 태아의 생명까지 위협할 수 있는 질환임을 확인함. 임산부가 임신 기간 중 고혈압 등의 증상을 스스로 발견하기 힘들다는 점과 임산부의 잦은 이동이 불편한 점을 고려하여 임산부의 혈압을 가정에서 측정한 후 병원으로 데이터를 보내 자간전증의 위험성을 의사가 판단하도록 하는 방법을 이전에 탐구했던 광혈류측정센서를 활용하여 친구와 함께 설계해 봄</span>. <span class="h2" data-rank="2">두 학술자료를 탐독하며 수축기 혈압이 맥파전달시간과 비례함과 이완기 혈압이 수축기 혈압과 비례하지만 광혈류측정센서와 심전도 센서의 위상차와는 반비례함을 확인함</span>. <span class="h3" data-rank="3">(*전자간증은 임신 20주 이후에 발생하는 고혈압성 질환으로 흔히 '임신중독증' 혹은 자간전증이라고도 불림.) 이전 탐구 활동의 성과를 진로(의사) 관련 실용 기기 설계로 확장하는 연계성이 돋보임</span>.`,
        comps:[

    {tab:'사례 4',subject:'진로활동 (개 후각·치매)',type:'창의적 체험활동상황',
     text:`수업량 유연화 주간에 '개가 주인의 간질 발작을 발생 전에 미리 알아차렸다'라는 뉴스기사를 접하고 호기심을 느껴 탐구하던 중 <span class="h1">개의 후각을 이용하여 암세포 속 비정상 대사 산물을 감지하도록 하는 연구가 진행되고 있다는 것을 알게 됨. 종양 대사에서 발생하는 mhc, 체내 유기 휘발성 물질의 구성이 정상 대사와 달라 냄새 분자 또한 다르다는 것을 알게 되었고 이를 개가 감지할 수 있도록 훈련시킨다는 내용을 탐구하고 비슷한 원리로 치매의 조기 진단에도 사용될 수 있을 것이라 생각함</span>. <span class="h2">치매 원인으로 지목되는 타우 단백질과 아밀로이드 베타 단백질로 인해 야기되는 신경 염증이 발생하게 되는데 염증 과정 속 여러 화학 물질 중 개가 후각으로 감지할 수 있는 비휘발성 또는 휘발성 물질이 있다면 암 조기진단과 마찬가지로 개를 치매 진단에 이용할 수 있을 것이라는 가능성을 제시함</span>. <span class="h3">치매 진단법 중 개를 이용한 치매진단법이 현실화된다면 치매 진단에 대한 환자의 거부감을 줄일 수 있을 것이라 주장함. 또한 치매 진단을 위해 자신의 관심분야를 신경계에 국한시킬 것이 아니라 생물학적, 화학적 분야의 이슈로도 관심을 확대하겠다고 다짐함</span>.`,
     comps:[{r:1,name:'창의적 사고 역량',desc:'개의 후각 탐지 원리를 치매 진단에 창의적으로 연결하는 독창적 탐구 발상',pct:45},{r:2,name:'지식정보처리 역량',desc:'타우·아밀로이드 베타 관련 학술 정보를 탐색하여 논리적 가설을 구성',pct:35},{r:3,name:'자기관리 역량',desc:'관심 분야를 신경계에서 생물·화학으로 확장하겠다는 자기주도 학습 의지',pct:20}]},
    {tab:'사례 5',subject:'진로활동 (해피 암 치료센터)',type:'창의적 체험활동상황',
     text:`2학년 때 백혈병에 대해 탐구하며 암 치료뿐만 아니라 우울증에 대한 치료와 관리가 필요하다고 깨달은 것을 계기로 <span class="h1">암 환자들이 행복하게 치료받을 수 있는 양한방 협진 시스템을 구상해 보겠다는 포부를 가지고 진로 융합 탐구 프로젝트의 주제로 '해피 암 치료센터'를 선택함. 수술 후유증 관리와 환자의 심리 안정에 초점을 맞추어 침 치료와 뜸 치료, 효소욕 요법 등을 주된 후유증 치료 방법으로 제시하였으며 면역력 증진을 위하여 인프레크 요법을 사용한 체계적인 생활관리 시스템을 구상함</span>. <span class="h2">다른 의학 계열을 희망하는 모둠원들과 함께 작업치료, 미술치료, 연극치료를 동반한 심리 안정 프로그램을 구상한 것이 인상적임. 프로젝트 리더로서 '해피 암 치료센터'의 뼈대를 만들고 특유의 유머와 에너지로 소극적인 모둠원들을 격려해 모두가 적극적으로 참여한 암 치료센터 홍보 영상을 제작함</span>. <span class="h3">친구들로부터 암 치료 외에도 환자의 정서적 측면을 보살피는 것이 중요함을 깨달을 수 있었다는 평가를 받았으며, 암 치료를 넘어 치료 과정 중 그리고 이후의 환자 행복까지 고려하는 양한방 통합 치료 환경이 많아져야 한다는 소감을 남김</span>.`,
     comps:[{r:1,name:'창의적 사고 역량',desc:'양한방 협진 시스템과 심리치료 프로그램을 독창적으로 설계하는 역량',pct:45},{r:2,name:'협력적 소통 역량',desc:'모둠원들을 격려하고 이끌어 홍보 영상까지 완성하는 리더십과 협업',pct:35},{r:3,name:'심미적 감성 역량',desc:'환자의 정서와 행복을 치료의 핵심 가치로 인식하는 인간 중심 감수성',pct:20}]}

      {
        no:1,tab:'사례 1',subject:'동아리활동 (손 소독제 실험)',type:'창의적 체험활동상황',
        text:`<span class="h1" data-rank="1">'손 소독제 성분별 항균 효과 비교'를 주제로 탐구활동을 진행함. 손 소독제의 성분들 중 글리세린과 에탄올의 함량에 주목하여 두 성분을 변인으로 잡은 뒤 글리세린과 에탄올 농도가 각기 다른 손 소독제, 그리고 한천 배지(핸드 플레이트)를 준비하여 실험을 진행하였고 그 결과 에탄올은 70%일 때 글리세린 농도는 30%일 때가 가장 세균 배양이 적음을 확인함</span>. <span class="h2" data-rank="2">이렇게 알아낸 농도를 이용하여 직접 간이 손 소독제를 만들고 이를 자체 제작한 포스터와 함께 학교 곳곳에 배치하여 학생들이 이용할 수 있도록 하는 캠페인도 진행함</span>. 이후 신경계 질환과 유전 단원 수업 후 정신질환은 유전되는가를 주제로 탐구함. DNA 염기서열 자체는 변하지 않으면서 특정 유전자의 발현에 관여하는 발현 스위치가 생겨 표현형이 달라져 자손에게 유전되는 후성 유전에 대해 알게 됨. 분자 유전학적 학술자료들을 분석하고 정리하여 조현병을 비롯한 여러 정신질환들이 환경과 유전의 영향을 모두 받는다는 결론을 내림. <span class="h3" data-rank="3">중증 정신질환 치료를 위해 국가책임제를 도입하고 정신 응급과 급성기 치료를 필수 의료로 지원하며 지역사회의 치료와 재활에 대한 적극적인 투자가 필요하다고 주장함. 조현병의 조기발견의 중요성을 역설하면서 10대들도 쉽게 할 수 있는 조현병 자가검진 설문을 만들고 싶다는 포부를 밝힘</span>.`,

      {
        no:2,tab:'사례 2',subject:'동아리활동 (뇌과학 스터디)',type:'창의적 체험활동상황',
        text:`전문서적 'Neuroscience(Dale Purves 외)'를 탐독하는 스터디를 구성하고 읽기 자료를 제작하여 학우들과 공유함. <span class="h1" data-rank="1">공간기억과 장기기억이 저장되는 해마에 주목해 그 역할과 뇌 질환의 관계에 대해 탐구함. '월간 뇌과학' 잡지 간행을 제안하고 편집장을 맡아 지식 나눔을 실천함. 해마치상회에서 성체 신경생성이 일어남을 인지하고 학술자료를 참고하여 신경줄기세포에서부터 해마 전구세포를 거쳐 뉴런으로 분화되는 과정을 알기 쉽게 정리함</span>. <span class="h2" data-rank="2">알츠하이머병의 병태생리학적 특징인 성체 신경생성의 감소와 신경세포와 시냅스의 손실을 완화하기 위한 방법으로 뇌유래신경성장인자(BDNF)를 소개하는 글을 작성함. 'Kandel 신경과학의 원리'를 발췌독하며 미토콘드리아 기능장애로 인하여 사이토크롬C가 방출되어 캐스페이즈-9로 이어지는 세포자멸사 경로를 TrkB 수용체와 BDNF의 결합으로 억제하는 원리를 탐구함</span>. <span class="h3" data-rank="3">이후 PCR과 젤 전기영동을 활용해 구강상피세포의 mtDNA를 분석하는 실험을 조원들과 수행함. 퇴행성 뇌질환과 미토콘드리아의 관계를 mtDNA의 빠른 변이속도와 관련해 고찰하며 미토콘드리아 기능에 관여하는 단백질을 암호화하는 mtDNA에 발생한 변이를 교정하는 기술을 통한 치료의 가능성을 전망함</span>.`,

      {
        no:3,tab:'사례 3',subject:'동아리활동 (의수 제작)',type:'창의적 체험활동상황',
        text:`절단장애인의 불편에 대한 기사를 읽고 '현대사회의 인권'이라는 대주제를 선정해 '절단장애인의 심리적 고통과 미래형 근전도 의수 개발에 대한 탐구'라는 탐구 주제를 선정하여 1년 동안 탐구활동을 진행함. <span class="h1" data-rank="1">절단장애인의 고통을 이해하고 실제 전문의를 인터뷰해 그들의 정신적 어려움과 치료, 환상통을 자세히 알아보려 한 점이 돋보임. 의수 제작 이전에 교과지식을 바탕으로 근전도 신호와 근육의 구조에 대해 학습하고 근전도 신호 측정 활동을 함. '바이오닉맨(임창환)'을 읽고 의수의 종류와 원리를 알고 직접 이해하기 위해 아두이노와 근전도 센서를 사용해 다섯손가락 간이 근전도 의수를 구현함</span>. <span class="h2" data-rank="2">코딩 경험이 전무한 조원들이 있어 시행착오가 있었음에도 조원들을 이끌고 알려주며 프로그래밍을 성공해내는 도전정신이 인상적임</span>. <span class="h3" data-rank="3">절단장애인을 위한 심리적 지원과 심리 활용 의수디자인 등 의수의 발전을 위해 더 노력하기를 원함. 이후 3학년 동아리에서 근육 중복도의 수학적 이해를 탐구하며 1·2학년 의수 제작 탐구를 수학적 모델링으로 심화 연계하는 지속적 성장이 돋보임</span>.`,

// STATE
let cat='korean', idx=0;

function sw(c,btn){
  cat=c; idx=0;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function gEx(i){idx=i;render();}

function render(){
  const catData=DATA[cat];
  const compData=COMPS[cat];
  const item=catData.items[idx];
  const isActs=catData.noComp;

  const tabsHtml=catData.items.map((it,i)=>
    `<button class="etab${i===idx?' active':''}" style="--cc:${catData.color}" onclick="gEx(${i})">${it.tab}</button>`
  ).join('');

  let bodyHtml='';
  if(item.isComp){
    const chipColors=['#c4930a','#1a7a47','#8b2252','#c45208','#1a6fa3','#6a3e15','#7a2a8a','#2d6060'];
    const chips=compData.items.map((c,i)=>`
      <div class="chip" style="border-left-color:${chipColors[i]||'#666'}">
        <div class="chip-num" style="color:${chipColors[i]||'#666'}">역량 ${String(i+1).padStart(2,'0')}</div>
        <div class="chip-name" style="color:${chipColors[i]||'#666'}">${c.name}</div>
        <div class="chip-desc">${c.desc}</div>
      </div>`).join('');
    bodyHtml=`
      <div class="comp-intro fade-in">
        <div class="ci-title">${compData.label}</div>
        <div class="ci-sub">2022 개정 교육과정에 명시된 교과 역량입니다. 아래 역량들이 학생부 기록에 어떻게 드러나는지 사례에서 확인하세요.</div>
        <div class="comp-grid">${chips}</div>
        <div class="src-note">📌 출처: 2022 개정 교육과정 각 교과 교육과정 총론 및 교과별 성격·목표 항목<br>지극히 개인적인 의견이며, 고민하는 모두가 정답입니다.</div>
      </div>`;
  } else {
    const comps=item.comps||[];
    const analysisRows=comps.map(c=>`
      <div class="ra-row" onclick="jumpTo(${c.r})">
        <span class="ra-bdg rb${c.r}">${c.r}위 역량</span>
        <div class="ra-info">
          <div class="ra-top">
            <span class="ra-name rn${c.r}">${c.name}</span>
            <span class="ra-pct">${c.pct}%</span>
          </div>
          <div class="ra-bar"><div class="ra-fill rf${c.r}" style="width:${c.pct}%"></div></div>
          <div class="ra-desc">${c.desc}</div>
        </div>
      </div>`).join('');

    bodyHtml=`
      <div class="rec fade-in">
        <div class="rec-meta">
          <span class="m-sub" style="background:${catData.color}">${item.subject||''}</span>
          <span class="m-type">${item.type||''}</span>
        </div>
        <div class="rec-body" id="rec-body">${item.text||''}</div>
        ${comps.length?`
        <div class="rec-analysis">
          <div class="ra-hdr">🎯 교과역량 분석</div>
          <div class="ra-rows">${analysisRows}</div>
          <div class="ra-hint">👆 역량 카드를 클릭하면 해당 서술로 이동합니다</div>
        </div>`:''}
      </div>`;
  }

  document.getElementById('mc').innerHTML=`
    <div class="cat-hdr">
      <span class="cat-badge" style="background:${catData.color}">${catData.label}</span>
      <span class="cat-name">${catData.label} 기록 사례</span>
    </div>
    <div class="etabs" style="--cc:${catData.color}">${tabsHtml}</div>
    ${bodyHtml}
  `;
}

function jumpTo(rank){
  const spans=document.querySelectorAll('.h'+rank);
  if(!spans.length) return;
  spans[0].scrollIntoView({behavior:'smooth',block:'center'});
  document.querySelectorAll('.h1,.h2,.h3').forEach(s=>s.classList.remove('glow'));
  spans.forEach(s=>{
    s.classList.add('glow');
    setTimeout(()=>s.classList.remove('glow'),2000);
  });
}

render();

</script>
